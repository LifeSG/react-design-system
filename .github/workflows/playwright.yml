name: Playwright Tests
on:
  push:
    branches:
      - "pre-release/**"
  pull_request:
    branches:
      - "pre-release/**"
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: ./scripts/e2e-ci-build.sh
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-dist
          path: dist/
          retention-days: 1

  test:
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install E2E Next.js app dependencies
        run: npm --prefix e2e/nextjs-app ci
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist/
      - name: Set up E2E test environment
        run: npm run test-e2e:setup
      - name: Run Playwright tests (shard ${{ matrix.shard }}/4)
        run: ./scripts/e2e-ci-test.sh ${{ matrix.shard }}/4
      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    needs: test
    if: ${{ !cancelled() }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: blob-reports/
          merge-multiple: true
      - name: Merge reports
        run: npx playwright merge-reports --reporter=github,html ./blob-reports
      - uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
