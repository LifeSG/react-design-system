<div>
  <h1>Flagship Web Components - Angular Example</h1>

  <div class="example-section" style="display: flex; align-items: center; gap: 12px;">
    <strong>Theme mode:</strong>
    <button
      type="button"
      (click)="setThemeMode('light')"
      [style.font-weight]="themeMode === 'light' ? '700' : '400'"
      style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;"
    >
      Light
    </button>
    <button
      type="button"
      (click)="setThemeMode('dark')"
      [style.font-weight]="themeMode === 'dark' ? '700' : '400'"
      style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;"
    >
      Dark
    </button>
  </div>

  <div class="example-section">
    <h2>Button (lifesg-button)</h2>
    <p style="margin-bottom: 12px;">Click count: <strong>{{ clickCount }}</strong></p>

    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <lifesg-button label="Default Button" (button-click)="handleButtonClick()"></lifesg-button>
      <lifesg-button label="Secondary" styletype="secondary" (button-click)="handleButtonClick()"></lifesg-button>
      <lifesg-button label="Light" styletype="light" (button-click)="handleButtonClick()"></lifesg-button>
      <lifesg-button label="Danger" styletype="default" [danger]="true" (button-click)="handleButtonClick()"></lifesg-button>
      <lifesg-button label="Disabled" [disabled]="true"></lifesg-button>
      <lifesg-button label="Loading..." [loading]="true"></lifesg-button>
    </div>
  </div>

  <div class="example-section">
    <h2>Modal (lifesg-modal)</h2>
    <p style="margin-bottom: 12px;">
      The modal uses the actual ModalV2 + Card/Content/Footer/CloseButton slots from the React library.
    </p>
    <button
      (click)="openModal()"
      style="padding: 8px 16px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;"
    >
      Open Modal
    </button>

    <lifesg-modal
      [show]="showModal"
      heading="Confirm Action"
      content="Are you sure you want to proceed? This modal is rendered using the React ModalV2 component wrapped as a custom element."
      animationfrom="bottom"
      (modal-close)="closeModal()"
    ></lifesg-modal>
  </div>
</div>
